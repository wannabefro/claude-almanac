name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publisher

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install -U pip
          pip install build twine
      - name: Build
        run: python -m build
      - name: Verify
        run: |
          twine check dist/*
          ls -la dist/
      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          PLUGIN_VERSION=$(python -c "import json; print(json.load(open('plugin.json'))['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match pyproject version $PYPROJECT_VERSION" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match plugin.json version $PLUGIN_VERSION" >&2
            exit 1
          fi
          echo "Versions consistent: $TAG_VERSION"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  integration:
    name: Integration tests (release gate)
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        # No --health-cmd: the ollama image does not ship with curl/wget,
        # so any http-based health probe fails on container start. The
        # "Pull bge-m3" step has its own retry loop from the runner host.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e '.[dev,openai,voyage]'
      - name: Pull bge-m3
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags > /dev/null; then break; fi
            sleep 2
          done
          curl -fsS -X POST http://127.0.0.1:11434/api/pull \
            -d '{"name": "bge-m3"}' | tail -n 1
      - name: Pull gemma3:4b
        run: |
          curl -fsS -X POST http://127.0.0.1:11434/api/pull \
            -d '{"name": "gemma3:4b"}' | tail -n 1
      - name: Verify models
        run: |
          curl -s http://127.0.0.1:11434/api/tags | grep -q bge-m3
          curl -s http://127.0.0.1:11434/api/tags | grep -q gemma3
      - name: Warm gemma3:4b
        run: |
          # CPU-only runners take ~1-2 minutes for the first inference.
          # Warm the model so the first real test doesn't absorb the cold load.
          curl -fsS -X POST http://127.0.0.1:11434/api/generate \
            -d '{"model":"gemma3:4b","prompt":"hi","stream":false,"options":{"num_predict":1}}' \
            --max-time 300 | tail -c 200 || true
      - name: Pytest (integration)
        env:
          OLLAMA_HOST: http://127.0.0.1:11434
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest -m integration -v

  publish:
    name: Publish to PyPI
    needs: [build, integration]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/claude-almanac
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-from-tag \
            dist/*.whl dist/*.tar.gz
