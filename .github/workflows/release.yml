name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publisher

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install -U pip
          pip install build twine
      - name: Build
        run: python -m build
      - name: Verify
        run: |
          twine check dist/*
          ls -la dist/
      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          PLUGIN_VERSION=$(python -c "import json; print(json.load(open('plugin.json'))['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match pyproject version $PYPROJECT_VERSION" >&2
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match plugin.json version $PLUGIN_VERSION" >&2
            exit 1
          fi
          echo "Versions consistent: $TAG_VERSION"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/claude-almanac
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-from-tag \
            dist/*.whl dist/*.tar.gz
