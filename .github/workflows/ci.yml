name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit tests (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is intentionally excluded: GitHub's setup-python
        # ships a CPython whose sqlite3 extension was built with
        # --omit=load-extension, so sqlite_vec.load(conn) raises
        # `AttributeError: 'sqlite3.Connection' object has no attribute
        # 'enable_load_extension'`. The package works fine on real macOS
        # (uv / brew Python ship sqlite with extensions enabled); this is
        # an artefact of the runner image.
        os: [ubuntu-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,openai,voyage]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src/claude_almanac
      # Invariant check: CHANGELOG.md must have a `## <version>` header matching
      # pyproject.toml AND the predecessor's header must still be present.
      # Prevents the header-overwrite class of bug (see v0.3.2 → 0.3.3 history).
      - name: Changelog invariants
        run: python scripts/check_changelog.py
      # Pytest discovers every file under tests/unit/ recursively, which
      # includes the codeindex/ sub-suite added in Plan 2. No explicit path
      # enumeration needed.
      - name: Pytest (unit only)
        run: pytest tests/unit -v --cov=src/claude_almanac --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration:
    name: Integration tests (Ubuntu, py3.12, live Ollama)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
       startsWith(github.base_ref, 'release/'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e '.[dev,openai,voyage]'
      # Cache the Ollama models blob store between runs. Bump the v<N>
      # suffix when adding/removing models so the key invalidates.
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: /tmp/ollama-models
          # Bump the v<N> suffix whenever the model list below changes so
          # the key invalidates on next run.
          key: ollama-models-v2-qwen3-embedding-bge-m3-gemma3-4b
      - name: Start Ollama container with cached volume
        run: |
          mkdir -p /tmp/ollama-models
          sudo chown -R 1000:1000 /tmp/ollama-models
          docker run -d --name ollama \
            -p 11434:11434 \
            -v /tmp/ollama-models:/root/.ollama \
            ollama/ollama:latest
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags > /dev/null; then
              break
            fi
            sleep 2
          done
      - name: Pull qwen3-embedding:0.6b (default since v0.3.9)
        run: |
          curl -fsS -X POST http://127.0.0.1:11434/api/pull \
            -d '{"name": "qwen3-embedding:0.6b"}' | tail -n 1
      - name: Pull bge-m3 (legacy fixtures reference it)
        run: |
          curl -fsS -X POST http://127.0.0.1:11434/api/pull \
            -d '{"name": "bge-m3"}' | tail -n 1
      - name: Pull gemma3:4b (curator default)
        run: |
          curl -fsS -X POST http://127.0.0.1:11434/api/pull \
            -d '{"name": "gemma3:4b"}' | tail -n 1
      - name: Verify models
        run: |
          curl -s http://127.0.0.1:11434/api/tags | grep -q qwen3-embedding
          curl -s http://127.0.0.1:11434/api/tags | grep -q bge-m3
          curl -s http://127.0.0.1:11434/api/tags | grep -q gemma3
      - name: Pytest (integration)
        env:
          OLLAMA_HOST: http://127.0.0.1:11434
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest -m integration -v
